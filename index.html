    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .arabic-text {
            font-family: 'Amiri', serif;
            direction: rtl;
        }
        .arabic-header {
            font-family: 'Cairo', sans-serif;
            direction: rtl;
        }
        /* Custom Traditional Arabic Font Class */

            font-family: 'Traditional Arabic', 'Amiri', serif;
            font-weight: 400 !important; /* Force normal weight / non-bold */
        }
        .trad-arabic-bold {
            font-family: 'Traditional Arabic', 'Amiri', serif;
            font-weight: 700 !important; /* Force bold weight */
        }
        
        /* A4 Page Simulation for Screen Preview */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            padding: 10mm 10mm; 
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
            position: relative;
            box-sizing: border-box;
        }
        /* Certificate Content Area */
        .rapor-border {
            border: none;
            outline: none;
            padding: 0px 5px 20px 5px; /* Margin pinggir diminimalkan */
            height: 100%;
            min-height: calc(297mm - 20mm);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            row-gap: 12px;
        }
        /* Print Styles - Perfect A4 1-Page Layout without browser interference */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0mm !important; /* Zero margin to control spacing via padding */
            }
            html, body {
                width: 210mm !important;
                height: 297mm !important;
                overflow: hidden !important; /* MENGUNCI AGAR TIDAK ADA HALAMAN KEDUA */
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print {
                display: none !important;
            }
            .print-area {
                width: 210mm !important;
                height: 296mm !important; /* Memaksa elemen ini persis seukuran A4, dikurangi 1mm margin error */
                max-height: 296mm !important;
                padding: 5mm 10mm !important; /* Padding vertikal DIPANGKAS dari 8mm ke 5mm agar tidak over 1 page */
                box-shadow: none !important;
                margin: 0 !important;
                page-break-inside: avoid !important;
                page-break-after: avoid !important;
                break-after: avoid !important;
                box-sizing: border-box !important;
                display: block !important;
                background: white !important;
                overflow: hidden !important; /* Memotong konten ekstra yang tumpah ke halaman 2 */
            }
            .rapor-border {

                outline: none !important;

                height: 100% !important;
                max-height: 100% !important;

    <script type="text/babel">

        const SUBJECTS_TULIS_ISLAMIYAH = [

        const SUBJECTS_UMUM = [
            { id: "pkn", nameAr: "التربية الوطنية", nameId: "PKn" },

            { id: "matematika", nameAr: "الرياضيات", nameId: "Matematika" },

            { id: "ips", nameAr: "العلوم الاجتماعية", nameId: "IPS" },
            { id: "pjok", nameAr: "التربية البدنية والرياضة", nameId: "PJOK" },
            { id: "prakarya", nameAr: "الحرف اليدوية", nameId: "Prakarya" }
        ];

        // Combine all fields for Excel Structure
        const ALL_SUBJECT_FIELDS = [
            ...SUBJECTS_LISAN,
            ...SUBJECTS_TULIS_ISLAMIYAH,
            ...SUBJECTS_UMUM
        ];

        // Default Mock Students
        const DEFAULT_STUDENTS = [
            {
                id: "1",
                nisn: "202602015",
                nameLatin: "Athariz Chalief Saputra",
                nameArab: "أتاريز خليف سابوترا",
                grades: {
                    quran: 88, b_arab_lisan: 80, b_ingg_lisan: 80, qiraatul_kutub: 80, ubudiyah: 80, khitabah: 75,
                    tafsir: 80, hadits: 80, fiqih: 80, akhlaq: 80, tauhid: 80, tarikh: 80,
                    nushush: 80, durus_lughtah: 80, muthalaah: 80, tajwid: 80, imla: 80, khat: 80,
                    pkn: 80, b_indo: 80, b_ingg_umum: 80, matematika: 80, ipa: 80, ips: 80, pjok: 80, prakarya: 80
                },
                attendance: { sakit: 1, izin: 2, alpa: 0 },
                behavior: { suluk: "جيد جدا", nazhafah: "جيد جدا", muraqabah: "جيد جدا" }
            },
            {
                id: "2",
                nisn: "202602016",
                nameLatin: "Muhammad Zidan Al-Fatih",
                nameArab: "محمد زيدان الفاتح",
                grades: {
                    quran: 92, b_arab_lisan: 85, b_ingg_lisan: 78, qiraatul_kutub: 82, ubudiyah: 90, khitabah: 80,
                    tafsir: 88, hadits: 84, fiqih: 86, akhlaq: 90, tauhid: 85, tarikh: 82,
                    nushush: 80, durus_lughtah: 85, muthalaah: 88, tajwid: 90, imla: 84, khat: 85,
                    pkn: 88, b_indo: 85, b_ingg_umum: 82, matematika: 76, ipa: 80, ips: 82, pjok: 90, prakarya: 85
                },
                attendance: { sakit: 1, izin: 2, alpa: 0 },
                behavior: { suluk: "ممتاز", nazhafah: "جيد جدا", muraqabah: "ممتاز" }
            }
        ];

        // Arabic Numbers to Words Converter Utility
        function numberToArabicWords(num) {
            num = parseInt(num);
            if (isNaN(num)) return "-";
            if (num === 100) return "مائة";
            if (num === 0) return "صفر";
            
            const ones = ["", "واحد", "اثنان", "ثلاثة", "أربعة", "خمسة", "ستة", "سبعة", "ثمانية", "تسعة"];
            const tens = ["", "عشرة", "عشرون", "ثلاثون", "أربعون", "خمسون", "ستون", "سبعون", "ثمانون", "تسعون"];
            
            if (num < 10) return ones[num];
            if (num === 10) return "عشرة";
            if (num < 20) {
                const o = num % 10;
                if (o === 1) return "أحد عشر";
                if (o === 2) return "اثنا عشر";
                return ones[o] + " عشر";
            }
            
            const o = num % 10;
            const t = Math.floor(num / 10);
            
            if (o === 0) return tens[t];
            return ones[o] + " و" + tens[t];
        }

        // Convert standard numbers (1, 2, 3) to East Arabic digits (١, ٢, ٣)
        function toArabicDigits(str) {
            if (str === undefined || str === null) return "";
            const idMap = {
                '0': '٠', '1': '١', '2': '٢', '3': '٣', '4': '٤',
                '5': '٥', '6': '٦', '7': '٧', '8': '٨', '9': '٩'
            };
            return str.toString().replace(/[0-9]/g, function (w) {
                return idMap[w];
            });
        }

        function App() {
            // State
            const [schoolConfig, setSchoolConfig] = useState({
                mahadName: "معهد التربية الإسلامية ماليك",
                className: "السابع الألف",
                classNameLatin: "Kelas VII A",
                semester: "الثاني", 
                semesterLatin: "Genap",
                academicYear: "٢٠٢٥ - ٢٠٢٦ مـ",
                homeroomTeacher: "الأستاذ محمد أزكى مولا شكور",
                homeroomTeacherNip: "", 
                headmaster: "الأستاذ  عبد الحليم",
                headmasterNip: "", 
                placeDateGreg: "تنجرانج، ١٩ يونيو ٢٠٢٦ مـ",
                placeDateHijr: "٤ محرم ١٤٤٨ هـ",
                useEasternArabicDigits: true
            });

            const [students, setStudents] = useState(DEFAULT_STUDENTS);
            const [selectedStudentId, setSelectedStudentId] = useState("1");
            const [editingStudent, setEditingStudent] = useState(null);
            
            // Collapsible Config Panel state
            const [isConfigOpen, setIsConfigOpen] = useState(false);

            // Custom Notification Toast state
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });

            const currentStudent = students.find(s => s.id === selectedStudentId) || students[0] || null;

            // Trigger Custom Toast
            const triggerToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, show: false }));
                }, 4000);
            };

            const formatNum = (val) => {
                if (val === undefined || val === null) return "";
                return schoolConfig.useEasternArabicDigits ? toArabicDigits(val.toString()) : val.toString();
            };

            const calculateStats = (student) => {
                if (!student) return { total: 0, average: 0 };
                const grades = Object.values(student.grades);
                const total = grades.reduce((sum, g) => sum + Number(g || 0), 0);
                const average = grades.length > 0 ? (total / grades.length).toFixed(1) : 0;
                return { total, average };
            };

            const downloadExcelTemplate = () => {
                const headers = ["NISN (Nomor Induk)", "Nama Siswa (Latin)", "Nama Siswa (Arab)"];
                ALL_SUBJECT_FIELDS.forEach(sub => {
                    headers.push(`${sub.nameId} (${sub.id})`);
                });
                headers.push("Sakit", "Izin", "Alpa", "Suluk (Kelakuan)", "Nazhafah (Kebersihan)", "Muraqabah (Kedisiplinan)");

                const data = [
                    headers,
                    [
                        "202602015", "Athariz Chalief Saputra", "أتاريز خليف سابوترا",
                        ...ALL_SUBJECT_FIELDS.map(() => 80),
                        1, 2, 0, "جيد جدا", "جيد جدا", "جيد جدا"
                    ],
                    [
                        "202602016", "Muhammad Zidan Al-Fatih", "محمد زيدان الفاتح",
                        ...ALL_SUBJECT_FIELDS.map(() => 85),
                        1, 2, 0, "ممتاز", "جيد جدا", "ممتاز"
                    ]
                ];

                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Template Rapor");
                XLSX.writeFile(wb, `Template_Rapor_MBS.xlsx`);
                triggerToast("Template Excel berhasil diunduh!", "success");
            };

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = new Uint8Array(event.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        if (jsonData.length < 2) {
                            triggerToast("Berkas Excel kosong atau tidak sesuai format!", "error");
                            return;
                        }

                        const headers = jsonData[0];
                        const newStudents = [];

                        for (let i = 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if (!row || row.length === 0 || !row[1]) continue;

                            const nisn = String(row[0] || "");
                            const nameLatin = String(row[1] || "");
                            const nameArab = String(row[2] || "");

                            const grades = {};
                            let colIdx = 3;

                            ALL_SUBJECT_FIELDS.forEach(sub => {
                                grades[sub.id] = Number(row[colIdx] !== undefined ? row[colIdx] : 80);
                                colIdx++;
                            });

                            const sakit = Number(row[colIdx] || 0); colIdx++;
                            const izin = Number(row[colIdx] || 0); colIdx++;
                            const alpa = Number(row[colIdx] || 0); colIdx++;

                            const suluk = String(row[colIdx] || "جيد جدا"); colIdx++;
                            const nazhafah = String(row[colIdx] || "جيد جدا"); colIdx++;
                            const muraqabah = String(row[colIdx] || "جيد جدا");

                            newStudents.push({
                                id: String(Date.now() + i),
                                nisn,
                                nameLatin,
                                nameArab,
                                grades,
                                attendance: { sakit, izin, alpa },
                                behavior: { suluk, nazhafah, muraqabah }
                            });
                        }

                        if (newStudents.length > 0) {
                            setStudents(newStudents);
                            setSelectedStudentId(newStudents[0].id);
                            triggerToast(`Berhasil mengimpor ${newStudents.length} data siswa!`, "success");
                        } else {
                            triggerToast("Kolom Excel tidak sesuai dengan template.", "error");
                        }
                    } catch (err) {
                        console.error(err);
                        triggerToast("Gagal memproses file Excel.", "error");
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = null; // Reset file input
            };

            const saveStudentManualEdit = (e) => {
                e.preventDefault();
                const updated = students.map(s => s.id === editingStudent.id ? editingStudent : s);
                setStudents(updated);
                setEditingStudent(null);
                triggerToast("Perubahan data siswa berhasil disimpan!", "success");
            };

            // Enhanced Print/PDF call - Directs user to Native Print to save Arabic Ligatures natively
            const handlePrintPDF = () => {
                triggerToast("TIPS: Pada jendela Print yang muncul, ubah Tujuan/Destination menjadi 'Simpan sebagai PDF' (Save as PDF) untuk hasil kaligrafi Arab yang sempurna.", "success");
                setTimeout(() => {
                    window.print();
                }, 3500);
            };

            return (
                <div class="min-h-screen flex flex-col bg-slate-50">

                                <i class="fa-solid fa-circle-info text-xl text-blue-400"></i>
                                <span class="leading-relaxed">{toast.message}</span>
                            </div>
                        </div>
                    )}

                    {/* Header bar (no-print) */}
                    <header class="bg-gradient-to-r from-blue-600 via-blue-500 to-cyan-500 text-white shadow-md p-3.5 no-print">
                        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3">
                            <div class="flex items-center gap-3">
                                {/* Logo in Header Title updated to the official Pesantren Logo */}
                                <div class="p-1 bg-white/10 rounded-full shadow-inner shrink-0">
                                    <img 
                                        src="https://iili.io/FsLlXA7.png" 
                                        alt="Logo MBS" 
                                        class="h-10 w-10 object-contain rounded-full"
                                        onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x100?text=MBS"; }}
                                    />
                                </div>
                                <div>

                                    <p class="text-xs text-blue-100">Be Global Boarding School</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="px-2.5 py-0.5 bg-blue-600/40 rounded-full text-[11px] font-semibold text-white flex items-center gap-1.5 border border-white/20">
                                    <span class="h-2 w-2 rounded-full bg-yellow-400 animate-pulse"></span>
                                    Cetak A4 Ready
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <main class="flex-grow max-w-7xl w-full mx-auto p-3 md:py-4 grid grid-cols-1 lg:grid-cols-12 gap-4">
                        
                        {/* Compact Control Panel (Left column, no-print) */}
                        <div class="lg:col-span-4 space-y-3.5 no-print">
                            
                            {/* Card 1: Utama */}
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 space-y-3">

                                    <label class="block text-[10px] font-bold tracking-wider text-slate-400 mb-1 uppercase">PILIH SISWA:</label>

                                            value={selectedStudentId}
                                            onChange={(e) => setSelectedStudentId(e.target.value)}

                                        >
                                            {students.map(s => (
                                                <option key={s.id} value={s.id}>
                                                    {s.nameLatin}
                                                </option>
                                            ))}
                                        </select>
                                        <button 
                                            onClick={() => setEditingStudent(JSON.parse(JSON.stringify(currentStudent)))}

                                            title="Edit Nilai"

                                            <i class="fa-solid fa-pen-to-square text-sm"></i>
                                        </button>
                                    </div>
                                </div>

                                <button 
                                    onClick={handlePrintPDF}
                                    class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 active:scale-[0.98] text-white py-2.5 px-4 rounded-xl font-bold text-sm shadow-md transition-all flex items-center justify-center gap-2 border-0 shadow-blue-100"
                                >
                                    <i class="fa-solid fa-file-pdf text-lg animate-pulse"></i>
                                    <span>CETAK PDF (1 HALAMAN A4)</span>
                                </button>
                            </div>

                            {/* Card 2: Pengaturan Rapor */}
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <button 
                                    onClick={() => setIsConfigOpen(!isConfigOpen)}
                                    class="w-full flex justify-between items-center p-3.5 text-left font-bold text-xs text-slate-800 hover:bg-slate-50 transition"
                                >
                                    <span class="flex items-center gap-2">
                                        <i class="fa-solid fa-sliders text-blue-600 text-sm"></i>
                                        Pengaturan Rapor
                                    </span>
                                    <i class="fa-solid fa-chevron-down text-[10px] transition-transform"></i>
                                </button>
                                
                                {isConfigOpen && (
                                    <div class="p-4 border-t border-slate-100 space-y-3 text-[11px] bg-slate-50/50">
                                        <div class="grid grid-cols-2 gap-2">
                                            <div>
                                                <label class="block font-bold text-slate-500 mb-0.5">NAMA KELAS (ARAB)</label>
                                                <input 
                                                    type="text" 
                                                    value={schoolConfig.className}
                                                    onChange={(e) => setSchoolConfig({...schoolConfig, className: e.target.value})}
                                                    class="w-full border border-slate-300 rounded-md px-2 py-1 font-medium text-slate-900 text-xs"
                                                />
                                            </div>
                                            <div>
                                                <label class="block font-bold text-slate-500 mb-0.5">SEMESTER (ARAB)</label>
                                                <input 
                                                    type="text"
