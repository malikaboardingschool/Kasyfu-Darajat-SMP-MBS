<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Aplikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header dengan margin top yang ditingkatkan (2cm setara sekitar 8 Tailwind units) -->
    <header class="mt-[2cm] bg-white shadow-md p-6 flex items-center justify-between mx-4 rounded-lg">
        <div class="flex items-center gap-4">
            <!-- Logo Bulat -->
            <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-inner">
                LP
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Dashboard Aplikasi</h1>
        </div>
        <nav>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Profil</button>
        </nav>
    </header>

    <main class="p-6">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold mb-4">Selamat Datang</h2>
            <p class="text-gray-600">Ini adalah tampilan dashboard dengan header yang telah disesuaikan dan logo berbentuk bulat.</p>
        </div>
    </main>

</body>
</html>
