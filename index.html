        function numberToArabicWords(num) {
            num = parseInt(num);
            if (isNaN(num)) return "-";
            if (num === 100) return "مائة";
            if (num === 0) return "صفر";
            
            const ones = ["", "واحد", "اثنان", "ثلاثة", "أربعة", "خمسة", "ستة", "سبعة", "ثمانية", "تسعة"];
            const tens = ["", "عشرة", "عشرون", "ثلاثون", "أربعون", "خمسون", "ستون", "سبعون", "ثمانون", "تسعون"];
            
            if (num < 10) return ones[num];
            if (num === 10) return "عشرة";
            if (num < 20) {
                const o = num % 10;
                if (o === 1) return "أحد عشر";
                if (o === 2) return "اثنا عشر";
                return ones[o] + " عشر";
            }
            
            const o = num % 10;
            const t = Math.floor(num / 10);
            
            if (o === 0) return tens[t];
            return ones[o] + " و" + tens[t];
        }

        function toArabicDigits(str) {
            if (str === undefined || str === null) return "";
            const idMap = {
                '0': '٠', '1': '١', '2': '٢', '3': '٣', '4': '٤',
                '5': '٥', '6': '٦', '7': '٧', '8': '٨', '9': '٩'
            };
            return str.toString().replace(/[0-9]/g, function (w) {
                return idMap[w];
            });
        }

                if (!student) return { total: 0, average: 0 };
                const grades = Object.values(student.grades);
                const total = grades.reduce((sum, g) => sum + Number(g || 0), 0);
                const average = grades.length > 0 ? (total / grades.length).toFixed(1) : 0;

                    ]

                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "Template Rapor");
                window.XLSX.writeFile(wb, `Template_Rapor_MBS.xlsx`);
                triggerToast("Template Excel berhasil diunduh!", "success");
            };

            const handleExcelUpload = (e) => {
                if (!window.XLSX) {
                    triggerToast("Library Excel sedang dimuat, coba lagi.", "error");
                    return;
                }
                const file = e.target.files[0];
                if (!file) return;

                    try {
                        const data = new Uint8Array(event.target.result);
                        const workbook = window.XLSX.read(data, { type: 'array' });

                        const worksheet = workbook.Sheets[sheetName];
                        const jsonData = window.XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                            const nameLatin = String(row[1] || "");
                            const nameArab = String(row[2] || "");

                            });

                            const izin = Number(row[colIdx] || 0); colIdx++;
                            const alpa = Number(row[colIdx] || 0); colIdx++;
